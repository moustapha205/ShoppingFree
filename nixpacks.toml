[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.intl", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.ctype", "php82Extensions.iconv", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"
]

[start]
cmd = "php -S 0.0.0.0:${PORT:-8080} -t public/"
